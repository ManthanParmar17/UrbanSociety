    <link rel="stylesheet" href="/admin/css/admin-nav.css">
    <link rel="stylesheet" href="/admin/css/dashboard.css">
    <link rel="stylesheet" href="../css/member_complaints.css">
</head>
<body>
<!-- ====================== COMMENT ===================== -->
<!-- member_complaints.html — member complaints submission/list -->
    <nav class="top-nav">
        <div class="nav-left">
            <button class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i> Back
            </button>
            <div class="nav-logo">
                <img src="/admin/images/image.png" alt="Logo">
                <span>Urban<span>Society</span></span>
            </div>
        </div>
        <div class="nav-center">
            <ul class="nav-menu">
                <li><a href="member_dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="member_notices.html"><i class="fas fa-bullhorn"></i> Notices</a></li>
                <li><a href="member_events.html"><i class="fas fa-calendar"></i> Events</a></li>
                <li><a class="active" href="member_complaints.html"><i class="fas fa-exclamation-triangle"></i> Complaints</a></li>
                <li><a href="member_bills.html"><i class="fas fa-file-invoice"></i> Bills</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="dropdown">
                <div class="user-profile">
                    <i class="fas fa-user-circle"></i>
                    <div class="user-info">
                        <span id="userName">Member</span>
                        <span class="user-role">Resident</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
                <div class="dropdown-content">
                    <a href="member_profile.html"><i class="fas fa-user"></i> My Profile</a>
                    <a href="#" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="content-header">
            <h1>My Complaints</h1>
            <button class="btn-primary" onclick="showAddComplaintModal()"><i class="fas fa-plus"></i> Add Complaint</button>
        </div>
        <div id="complaintsList" class="complaints-container"></div>

        <div class="content-header" style="margin-top:32px;">
            <h1>All Complaints (Community)</h1>
        </div>
        <div id="allComplaintsList" class="complaints-container"></div>
    </main>

    <!-- Add Complaint Modal -->
    <div class="modal" id="addComplaintModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Complaint</h3>
                <span class="close-btn" onclick="closeModal('addComplaintModal')">&times;</span>
            </div>
            <form id="complaintForm">
                <div class="form-group">
                    <label for="complaintTitle">Title</label>
                    <input type="text" id="complaintTitle" placeholder="e.g., Water leakage in kitchen" required>
                </div>
                <div class="form-group">
                    <label for="complaintCategory">Category</label>
                    <select id="complaintCategory" required>
                        <option value="">Select category</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Security">Security</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Parking">Parking</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="complaintPriority">Priority</label>
                    <select id="complaintPriority" required>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="complaintDescription">Description</label>
                    <textarea id="complaintDescription" rows="4" placeholder="Describe the issue..." required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal('addComplaintModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/member_complaints.js"></script>
    <footer class="page-footer">@LeoVisionaries</footer>
</body>
</html>
